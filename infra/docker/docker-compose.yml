name: project-nps

services:
  mysql:
    image: mysql:8.4
    container_name: project-nps-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-project_nps}
      MYSQL_USER: ${MYSQL_USER:-project_nps}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-project_nps}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - '${MYSQL_HOST_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: project-nps-redis
    restart: unless-stopped
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: node:22-bookworm
    container_name: project-nps-api
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3003}
      DATABASE_URL: ${DATABASE_URL:-mysql://project_nps:project_nps@mysql:3306/project_nps}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - '${API_HOST_PORT:-3003}:${API_PORT:-3003}'
    volumes:
      - ../..:/workspace
      - api-node-modules:/workspace/node_modules
      - api-nx-cache:/workspace/.nx
    command: sh -c "npm ci && npx nx reset && npx nx serve api"

  web:
    image: node:22-bookworm
    container_name: project-nps-web
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '${WEB_HOST_PORT:-4200}:4200'
    volumes:
      - ../..:/workspace
      - web-node-modules:/workspace/node_modules
      - web-nx-cache:/workspace/.nx
    command: sh -c "npm ci && npx nx serve web --host=0.0.0.0 --port=4200"

volumes:
  mysql-data:
  redis-data:
  api-node-modules:
  api-nx-cache:
  web-node-modules:
  web-nx-cache:
